name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build exe
        run: |
          pyinstaller --name "WeakShortTool" --windowed --onefile --noconfirm --clean main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeakShortTool-Windows-x64
          path: dist/WeakShortTool.exe

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build app bundle
        run: |
          pyinstaller --name "WeakShortTool" --windowed --onedir --noconfirm --clean main.py

      - name: Create PKG installer
        run: |
          APP_PATH="dist/WeakShortTool.app"
          if [ ! -d "$APP_PATH" ]; then
            mkdir -p "$APP_PATH/Contents/MacOS"
            cp dist/WeakShortTool "$APP_PATH/Contents/MacOS/WeakShortTool"
            chmod +x "$APP_PATH/Contents/MacOS/WeakShortTool"
            cat > "$APP_PATH/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>WeakShortTool</string>
            <key>CFBundleExecutable</key><string>WeakShortTool</string>
            <key>CFBundleIdentifier</key><string>com.sixben.weakshort</string>
            <key>CFBundleVersion</key><string>1.0.0</string>
            <key>CFBundlePackageType</key><string>APPL</string>
          </dict>
          </plist>
          PLIST
          fi

          INSTALL_DIR=$(mktemp -d)
          mkdir -p "$INSTALL_DIR/Applications"
          cp -R "$APP_PATH" "$INSTALL_DIR/Applications/"

          pkgbuild \
            --root "$INSTALL_DIR" \
            --identifier "com.sixben.weakshort" \
            --version "1.0.0" \
            --install-location "/" \
            "dist/WeakShortTool-macOS-AppleSilicon.pkg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeakShortTool-macOS-AppleSilicon
          path: dist/WeakShortTool-macOS-AppleSilicon.pkg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir release
          cp artifacts/WeakShortTool-Windows-x64/WeakShortTool.exe release/WeakShortTool-Windows-x64.exe
          cp artifacts/WeakShortTool-macOS-AppleSilicon/WeakShortTool-macOS-AppleSilicon.pkg release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: WeakShortTool ${{ github.ref_name }}
          body: |
            ## Weak Short 批量审核工具 ${{ github.ref_name }}

            从测试文件中自动提取并归类 Weak Short-Circuit Test 结果。

            ### 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | **Windows 10/11** | `WeakShortTool-Windows-x64.exe` | 64-bit 便携版，双击直接运行 |
            | **macOS (Apple Silicon)** | `WeakShortTool-macOS-AppleSilicon.pkg` | M1/M2/M3/M4 芯片，双击安装到 Applications |

            > **macOS 首次运行提示**：如果提示"无法打开"，请前往 系统设置 → 隐私与安全性 → 点击「仍要打开」。
            >
            > **Intel Mac 用户**：Apple Silicon 版本可通过 Rosetta 2 在 Intel Mac 上运行。
          files: release/*
          draft: false
          prerelease: false
